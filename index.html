
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Academic Navigator</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-ui: 'Inter', sans-serif;
            --font-academic: 'Lora', serif;
        }
        body {
            font-family: var(--font-ui);
            background-color: #fcfcfd; /* Slightly warmer white for paper-like feel */
            font-size: 17px; /* Increased base size */
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .academic-text {
            font-family: var(--font-academic);
            line-height: 1.7;
        }

        /* Custom prose overrides for Claude-like feel */
        .prose-academic {
            font-family: var(--font-academic);
            font-size: 1.125rem; /* ~18px */
            line-height: 1.75;
            color: #1e293b;
        }
        .prose-academic strong {
            color: #4338ca; /* Indigo 700 */
            font-weight: 600;
        }
        
        /* Message bubble animations */
        @keyframes message-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim {
            animation: message-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.1",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
